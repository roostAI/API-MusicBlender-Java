config:
  target: "{{ $processEnvironment.API_HOST }}"
  plugins:
    expect: {}
  payload:
    path: "./pet_put_others.csv"
    skipHeader: true
    delimiter: "^|^"

scenarios:
  - name: "Test scenario for non-successful API responses"
    flow:
      - log: "Sending a PUT request with invalid payload missing required fields"
      - put:
          url: "/pet"
          headers:
            Authorization: "Bearer {{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            name: ""
            photoUrls: []
      - expect:
          - statusCode: 400
          - contentType: "application/json"
          - hasProperty: "message"
      - think: 2

      - log: "Sending a PUT request with invalid enum value in 'status'"
      - put:
          url: "/pet"
          headers:
            Authorization: "Bearer {{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            id: 10
            name: "doggie"
            photoUrls: ["https://example.com/photo.jpg"]
            status: "invalid_status"
      - expect:
          - statusCode: 400
          - contentType: "application/json"
          - hasProperty: "message"
      - think: 2

      - log: "Sending a PUT request with category object missing required properties"
      - put:
          url: "/pet"
          headers:
            Authorization: "Bearer {{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            id: 10
            name: "doggie"
            photoUrls: ["https://example.com/photo.jpg"]
            category:
              name: "Dogs"
            status: "available"
      - expect:
          - statusCode: 400
          - contentType: "application/json"
          - hasProperty: "message"
      - think: 2

      - log: "Sending a PUT request with invalid headers and no authorization token"
      - put:
          url: "/pet"
          headers:
            InvalidHeader: "InvalidValue"
          payload:
            id: 10
            name: "doggie"
            photoUrls: ["https://example.com/photo.jpg"]
            status: "available"
      - expect:
          - statusCode: 401
          - contentType: "application/json"
          - hasProperty: "message"
      - think: 2

      - log: "Sending a PUT request to an invalid URL"
      - put:
          url: "/invalid_pet"
          headers:
            Authorization: "Bearer {{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            id: 10
            name: "doggie"
            photoUrls: ["https://example.com/photo.jpg"]
            status: "available"
      - expect:
          - statusCode: 404
          - contentType: "application/json"
          - hasProperty: "message"
      - think: 2

      - log: "Sending a PUT request with unsupported media type"
      - put:
          url: "/pet"
          headers:
            Authorization: "Bearer {{ $processEnvironment.AUTH_TOKEN }}"
            Content-Type: "text/plain"
          payload: "InvalidPayloadText"
