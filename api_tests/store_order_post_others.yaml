scenarios:
  - name: "Test non-successful responses for /store/order endpoint"
    flow:
      - log: "Sending request with invalid payload (missing required fields)"
      - post:
          url: "/store/order"
          headers:
            Content-Type: application/json
            Authorization: "{{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            petId: null
            quantity: null
      - expect:
          statusCode: 400
          hasProperty: "message"
