      - post:
          url: "/store/order"
          headers:
            Content-Type: application/json
            Authorization: "invalid_token"
          payload:
            id: 10
            petId: 198772
            quantity: 7
            shipDate: "2023-10-01T12:00:00Z"
            status: "approved"
            complete: true
      - expect:
          statusCode: 401
          hasProperty: "error"
          hasProperty: "message"
      - think: 3

      - log: "Sending request with invalid URL/path"
      - post:
          url: "/store/order-invalid"
          headers:
            Content-Type: application/json
            Authorization: "{{ $processEnvironment.AUTH_TOKEN }}"
          payload:
            id: 10
            petId: 198772
            quantity: 2
            shipDate: "2023-10-01T12:00:00Z"
            status: "approved"
            complete: false
      - expect:
          statusCode: 404
          hasProperty: "error"
      - think: 2

      - log: "Sending request with invalid status value"
