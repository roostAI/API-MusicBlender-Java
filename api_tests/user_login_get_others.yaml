config:
  target: "{{ $processEnvironment.API_HOST }}"
  plugins:
    expect: {}

scenarios:
  - name: Test various non-successful API responses for user login
    flow:
      - log: "Testing login with invalid username and password. Expecting 401 Unauthorized."
      - get:
          url: "/user/login?username=invalidUser&password=invalidPass"
          headers:
            Authorization: "{{ $processEnvironment.AUTH_TOKEN }}"
      - expect:
          statusCode: 401
          hasProperty: "error"
      - capture:
          - json: error
          - json: message
      - think: 2

      - log: "Testing login with missing username parameter. Expecting 400 Bad Request."
      - get:
          url: "/user/login?password=somePassword"
          headers:
            Authorization: "{{ $processEnvironment.AUTH_TOKEN }}"
      - expect:
          statusCode: 400
          hasHeader: "Content-Type"
          headerEquals:
            Content-Type: "application/json"
          notHasProperty: "username"
      - capture:
          - json: error
          - json: message
          - json: documentation_url
      - think: 2

      - log: "Testing login with an incorrect URL. Expecting 404 Not Found."
      - get:
          url: "/user/login_invalid?username=validUser&password=validPass"
          headers:
            Authorization: "{{ $processEnvironment.AUTH_TOKEN }}"
      - expect:
          statusCode: 404
          hasProperty: "error"
          matchesRegexp:
            error: ".*not found.*"
      - capture:
          - json: error
          - json: message
      - think: 2

      - log: "Testing login with invalid Authorization token. Expecting 403 Forbidden."
      - get:
          url: "/user/login?username=validUser&password=validPass"
          headers:
            Authorization: "InvalidToken"
      - expect:
          statusCode: 403
          hasProperty: "error"
          equals:
            error: "Unauthorized access"
      - capture:
          - json: error
          - json: message
      - think: 2
