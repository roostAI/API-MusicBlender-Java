# =============================================================================
# Weather API Authentication Configuration
# =============================================================================
# This file contains authentication credentials and API configuration settings
# for the Weather API testing framework.
#
# Properties can be overridden by environment variables with the AUTH_ prefix.
# For example: AUTH_ApiKeyAuth_apiKey overrides ApiKeyAuth_apiKey
# =============================================================================

# -----------------------------------------------------------------------------
# API Configuration
# -----------------------------------------------------------------------------

# Base URL for the Weather API
# Default: https://api.weatherapi.com/v1
api_baseUrl=<your-api-base-url>

# Environment setting (dev, staging, prod)
# Default: dev
api_environment=dev

# -----------------------------------------------------------------------------
# Authentication - ApiKeyAuth (API Key Authentication)
# -----------------------------------------------------------------------------
# API Key authentication using query parameter named "key"
# This key is sent as a query parameter in API requests

# Your Weather API key
# Obtain from: https://www.weatherapi.com/
ApiKeyAuth_apiKey=<your-weather-api-key-here>
